name: Sync Ref Data

on:
  schedule:
    - cron: '0 10 * * *'  # 2am PST (UTC-8), after opendbc generates at 8am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      - run: uv sync
        working-directory: pipeline

      - name: Fetch CARS.md from opendbc
        run: curl -sSf https://github.com/commaai/opendbc/raw/refs/heads/master/docs/CARS.md -o CARS.md
        working-directory: pipeline

      - name: Fetch metadata for detailed support info
        run: curl -sSf https://raw.githubusercontent.com/ugtthis/opendbc-site/main/src/data/metadata.json -o data/opendbc_metadata_ref.json
        working-directory: pipeline

      - name: Transform reference data
        run: uv run python markdown_to_json.py --input CARS.md --output data/opendbc_ref.json
        working-directory: pipeline

      - name: Generate sync summary
        id: summary
        run: |
          mkdir -p .github
          uv run python scripts/diff_cars.py
        working-directory: pipeline

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725  # v8.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[BOT] Update reference data from opendbc"
          branch: sync-ref-data
          delete-branch: true
          title: "[bot] Update reference data from opendbc"
          body-path: pipeline/.github/cars-sync-summary.md
          labels: automated
          add-paths: |
            pipeline/CARS.md
            pipeline/data/opendbc_metadata_ref.json
            pipeline/data/opendbc_ref.json

      - name: Enable auto-merge for healthy syncs
        if: steps.summary.outputs.sync_state == 'healthy' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash ${{ steps.create-pr.outputs.pull-request-number }}
