name: 01 - Scrape CarMax Listings

on:
  schedule:
    # Run daily at 12am PST (8am UTC)
    - cron: '0 8 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Kill if it takes >90 min (safety)

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch main branch
        run: |
          git fetch origin main:main || echo "No main branch yet"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: Install dependencies
        run: uv sync
        working-directory: pipeline

      - name: Run scraper
        run: uv run python scraper.py
        working-directory: pipeline
        env:
          ABCK_COOKIE: ${{ secrets.ABCK_COOKIE }}
          KMXVISITOR_COOKIE: ${{ secrets.KMXVISITOR_COOKIE }}

      - name: Merge scraped inventory
        run: uv run python merge_inventory.py
        working-directory: pipeline

      - name: Run matcher
        run: uv run python matcher.py
        working-directory: pipeline

      - name: Geocode missing stores
        run: uv run python scripts/geocode_missing_stores.py
        working-directory: pipeline
        env:
          PYTHONUNBUFFERED: "1"

      - name: Generate scraping summary
        if: always()
        id: summary
        run: |
          mkdir -p .github
          uv run python scripts/generate_pr_summary.py
        working-directory: pipeline

      - name: Create Pull Request
        if: always()
        id: create-pr
        uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725  # v8.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: "[BOT] Update listings"
          branch: scrape-${{ github.run_id }}
          delete-branch: true
          title: ${{ steps.summary.outputs.pr_title }}
          body-path: pipeline/.github/pr-summary.md
          labels: automated
          add-paths: |
            pipeline/data/openpilot_cars.json
            pipeline/data/scrape_counts.json
            pipeline/data/store-coords.json

      - name: Upload inventory artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: inventory-${{ github.run_id }}
          path: pipeline/data/*_full.jsonl
          retention-days: 30

      - name: Enable auto-merge for healthy runs
        if: steps.summary.outputs.workflow_state == 'healthy' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash ${{ steps.create-pr.outputs.pull-request-number }}
