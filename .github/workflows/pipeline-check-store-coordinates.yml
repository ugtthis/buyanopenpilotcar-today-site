name: Check Store IDs have coordinates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  store-coords:
    name: Store coordinates in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check all store IDs have coordinates
        run: node frontend/scripts/validate-store-coords.mjs

  build:
    name: TypeScript + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0

      - name: Install dependencies
        run: bun install
        working-directory: frontend

      - name: Type-check and build
        run: bun run build
        working-directory: frontend
