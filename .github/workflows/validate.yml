name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  store-coords:
    name: Store coordinates in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all store IDs have coordinates
        run: node frontend/scripts/validate-store-coords.mjs

  build:
    name: TypeScript + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: frontend

      - name: Type-check and build
        run: bun run build
        working-directory: frontend
