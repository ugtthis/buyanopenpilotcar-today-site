name: Sync CARS.md from opendbc

on:
  schedule:
    - cron: '0 10 * * *'  # 2am PST (UTC-8), after opendbc generates at 8am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.1
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
      - run: uv sync

      - name: Fetch CARS.md from opendbc
        run: curl -sSf https://github.com/commaai/opendbc/raw/refs/heads/master/docs/CARS.md -o CARS.md

      - name: Generate sync summary
        id: summary
        run: uv run python scripts/diff_cars.py

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "[BOT] Sync CARS.md from opendbc"
          branch: sync-cars-md
          delete-branch: true
          title: "[bot] Update CARS.md from opendbc"
          body-path: .github/cars-sync-summary.md
          labels: automated
          add-paths: CARS.md

      - name: Enable auto-merge for healthy syncs
        if: steps.summary.outputs.sync_state == 'healthy' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash ${{ steps.create-pr.outputs.pull-request-number }}
